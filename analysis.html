    <script>
        function applySearch() {
            const val = document.getElementById('ticInp').value.toUpperCase().trim();
            const gd = document.getElementById('plot_div');
            const err = document.getElementById('ticErr');
            err.innerText = "";
            if(!val) return;
            const tics = gd.data[0].text;
            if(!tics.includes(val)) {
                err.innerText = "⚠ 股票代码不存在 / Ticker not found";
                return;
            }
            const opacities = tics.map(t => t === val ? 1 : 0.05);
            Plotly.restyle(gd, { 'marker.opacity': [opacities], 'textfont.color': [tics.map(t => t === val ? '#000' : 'rgba(0,0,0,0)')] }, [0]);
        }
    </script>

        <script>
            function toggleLang() {
                const isZh = document.body.classList.contains('lang-zh-active');
                if(isZh) {
                    document.body.classList.replace('lang-zh-active', 'lang-en-active');
                    document.querySelectorAll('[data-en]').forEach(el => {
                        if(el.tagName === 'INPUT') el.placeholder = el.getAttribute('data-en');
                        else el.innerText = el.getAttribute('data-en');
                    });
                    document.querySelectorAll('[lang-zh]').forEach(el => el.style.display = 'none');
                    document.querySelectorAll('[lang-en]').forEach(el => el.style.display = 'block');
                } else {
                    document.body.classList.replace('lang-en-active', 'lang-zh-active');
                    document.querySelectorAll('[data-zh]').forEach(el => {
                        if(el.tagName === 'INPUT') el.placeholder = el.getAttribute('data-zh');
                        else el.innerText = el.getAttribute('data-zh');
                    });
                    document.querySelectorAll('[lang-zh]').forEach(el => el.style.display = 'block');
                    document.querySelectorAll('[lang-en]').forEach(el => el.style.display = 'none');
                }
            }
        </script>
